services:
  - type: web
    runtime: docker
    name: transcendence-nginx
    plan: starter
    dockerfilePath: ./nginx/Dockerfile.render
    dockerContext: ./nginx
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_HOST
        fromService:
          name: transcendence-frontend
          type: pserv
          property: host
      - key: FRONTEND_PORT
        fromService:
          name: transcendence-frontend
          type: pserv
          envVarKey: PORT
      - key: BACKEND_HOST
        fromService:
          name: transcendence-backend
          type: pserv
          property: host
      - key: BACKEND_PORT
        fromService:
          name: transcendence-backend
          type: pserv
          envVarKey: PORT

  - type: pserv
    runtime: docker
    name: transcendence-frontend
    plan: starter
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3000

  - type: pserv
    runtime: docker
    name: transcendence-backend
    plan: starter
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /
    disk:
      name: uploads
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: transcendence-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TEMP_JWT_SECRET
        generateValue: true
      - key: SECURITY_PEPPER
        generateValue: true
      - key: SALT_ROUNDS
        value: 12
      - key: PUBLIC_APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

databases:
  - name: transcendence-db
    plan: free
    databaseName: transcendence
    ipAllowList: []
