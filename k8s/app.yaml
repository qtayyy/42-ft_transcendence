apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ft-transcendence
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/qtayyy/42-ft_transcendence.git
    targetRevision: jaxz2
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ft-transcendence
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
