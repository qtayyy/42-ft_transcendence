services:
  postgres:
    container_name: postgres
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: transcendence
      POSTGRES_USER: transcendence
      POSTGRES_PASSWORD: transcendence
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - capybara

  nginx:
    container_name: nginx
    build: ./nginx
    networks:
      - capybara
    # restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - 8443:443
    develop:
      watch:
        - path: ./nginx/nginx.conf
          action: rebuild

  frontend:
    container_name: frontend
    build: ./frontend
    networks:
      - capybara
    # restart: always
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/next.config.ts
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync

  backend:
    container_name: backend
    build: ./backend
    networks:
      - capybara
    # restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://transcendence:transcendence@postgres:5432/transcendence?schema=public
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports:
      - 3001:3001
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - uploads/

networks:
  capybara:
    driver: bridge

volumes:
  pgdata:
